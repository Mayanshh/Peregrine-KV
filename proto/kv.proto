syntax = "proto3";

package peregrinekv.kv;

option go_package = "github.com/Mayanshh/Peregrine-KV/internal/kvpb;kvpb";

message PutRequest {
  bytes key = 1;
  bytes value = 2;
}

message PutResponse {
  bool ok = 1;
  string error = 2;
}

message GetRequest {
  bytes key = 1;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  string error = 3;
}

message DeleteRequest {
  bytes key = 1;
}

message DeleteResponse {
  bool ok = 1;
  string error = 2;
}

service KV {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

